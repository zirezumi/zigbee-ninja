# Release pipeline (docs/RELEASING.md): runs only when a version tag is pushed.
# Re-runs the full gates (a tag can point at any commit), builds and pushes the
# multi-arch image under immutable version tags, and signs it with cosign
# keyless (GitHub OIDC — no key material to manage or leak).
name: Release

on:
  push:
    tags: ["v*.*.*"]

permissions:
  contents: write # create the GitHub release
  packages: write # push to GHCR
  id-token: write # cosign keyless OIDC

jobs:
  gates:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Tag matches the package version
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          VERSION="$(python -c "import tomllib; print(tomllib.load(open('collector/pyproject.toml','rb'))['project']['version'])")"
          if [ "$TAG" != "$VERSION" ]; then
            echo "tag $TAG does not match collector/pyproject.toml version $VERSION" >&2
            exit 1
          fi
      - name: Install collector (editable, dev extras)
        run: python -m pip install -e './collector[dev]'
      - name: Lint
        run: ruff check collector tools
      - name: Tests
        run: pytest
        working-directory: collector
      - name: License policy (no GPL/AGPL deps — DESIGN.md §16)
        run: python tools/license_check.py
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Frontend typecheck + build
        run: npm ci --no-audit --no-fund && npm run build
        working-directory: frontend

  image:
    runs-on: ubuntu-latest
    needs: [gates]
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push multi-arch image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          # Immutable version tags only; whether releases also move :latest
          # is an open decision recorded in docs/RELEASING.md.
          tags: |
            ghcr.io/zirezumi/zigbee-ninja:${{ github.ref_name }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Install cosign
        uses: sigstore/cosign-installer@v3
      - name: Sign the image (keyless, by digest)
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
        run: cosign sign --yes "ghcr.io/zirezumi/zigbee-ninja@${DIGEST}"
      - name: Create the GitHub release (generated notes)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            --repo "$GITHUB_REPOSITORY" \
            --title "$GITHUB_REF_NAME" \
            --generate-notes
