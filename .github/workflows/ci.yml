name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  collector:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install collector (editable, dev extras)
        run: python -m pip install -e './collector[dev]'
      - name: Lint
        run: ruff check collector tools
      - name: Tests
        run: pytest
        working-directory: collector
      - name: License policy (no GPL/AGPL deps — DESIGN.md §16)
        run: python tools/license_check.py

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      # TODO(M1): switch to `npm ci` once package-lock.json is committed
      - name: Install
        run: npm install --no-audit --no-fund
        working-directory: frontend
      - name: Typecheck + build
        run: npm run build
        working-directory: frontend

  image:
    runs-on: ubuntu-latest
    needs: [collector, frontend]
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - name: Log in to GHCR
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build multi-arch image (push on main)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          tags: |
            ghcr.io/zirezumi/zigbee-ninja:latest
            ghcr.io/zirezumi/zigbee-ninja:sha-${{ github.sha }}
